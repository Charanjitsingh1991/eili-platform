name: Supabase keepalive ping

on:
  schedule:
    - cron: "0 6 */6 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST to prevent auto-pause
        run: |
          curl -sf -o /dev/null \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/rest/v1/"
          echo "Supabase ping sent at $(date -u)"
